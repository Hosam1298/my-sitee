<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

رحمة ❤️ حسام

</title>

<link
rel="stylesheet"
href="style.css">

<style>

/* شاشة الدخول */

.intro{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;
}

.intro-card{

background:
rgba(255,255,255,.12);

backdrop-filter:
blur(20px);

border:
1px solid
rgba(255,255,255,.12);

padding:45px;

border-radius:40px;

max-width:850px;

box-shadow:

0 0 45px
rgba(255,120,200,.25);

animation:
float 4s ease-in-out infinite;
}

.glow-title{

font-size:42px;

line-height:1.9;

text-shadow:

0 0 20px
rgba(255,140,220,.7);

margin-bottom:18px;
}

.subtitle{

font-size:19px;

line-height:2;

color:#ffeaf5;

margin-bottom:25px;
}

.enter-btn{

padding:16px 34px;

font-size:19px;

border:none;

border-radius:35px;

cursor:pointer;

background:

linear-gradient(
90deg,
#ff7eb3,
#ff4fa0
);

color:white;

transition:.35s;

box-shadow:

0 0 30px
rgba(255,120,200,.35);
}

.enter-btn:hover{

transform:
translateY(-4px)
scale(1.05);

box-shadow:

0 0 40px
rgba(255,120,200,.55);
}

.rose{

position:fixed;

top:-50px;

pointer-events:none;

z-index:999;
}

</style>

</head>

<body>

<div class="intro">

<div class="intro-card">

<h1
class="glow-title">

🌷✨  
كل عام وأنتِ بألف خير يا رحومتي  
✨🌷

</h1>

<p
class="subtitle">

وأحلى عيد هو ذاك الذي تكونين فيه ❤️  
يا أجمل إنسانة بحياتي…  
هذه ليست مجرد صفحة…  
بل شيء صغير صُنع بكل الحب 🌹

</p>

<button
class="enter-btn"
onclick="goPage('home.html')">

✨ اضغطي للدخول يا أجمل أعيادي ✨

</button>

</div>

</div>

<script
src="script.js">
</script>

<script>

/* ورود سينمائية */

setInterval(()=>{

let rose=
document.createElement(
"div"
);

rose.classList.add(
"rose"
);

rose.innerHTML=
["🌹","✨","💖"]
[Math.floor(
Math.random()*3
)];

rose.style.left=
Math.random()*100+
"vw";

rose.style.fontSize=
(22+
Math.random()*18)
+"px";

rose.style.animation=
"fly 6s linear forwards";

document.body
.appendChild(
rose
);

setTimeout(()=>{

rose.remove();

},6000);

},500);

</script>

</body>
</html>
